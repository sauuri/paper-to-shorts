<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper to Shorts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a14;
      color: #e2e2f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    .header { text-align: center; margin-bottom: 36px; }
    .header h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
    .header h1 span { color: #6366f1; }
    .header p { color: #666; font-size: 14px; margin-top: 8px; line-height: 1.6; }

    .card {
      background: #13131f;
      border: 1px solid #1e1e30;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 580px;
    }

    /* Tabs */
    .tabs { display: flex; gap: 6px; margin-bottom: 24px; background: #0a0a14; border-radius: 10px; padding: 4px; }
    .tab {
      flex: 1; padding: 9px 8px; background: transparent;
      border: none; border-radius: 8px; color: #666;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.18s;
    }
    .tab.active { background: #1e1e35; color: #fff; }

    /* Upload area */
    .upload-area {
      border: 1.5px dashed #2a2a45;
      border-radius: 12px; padding: 36px 20px;
      text-align: center; cursor: pointer;
      transition: all 0.18s; margin-bottom: 16px;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #6366f1; background: #15153a; }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-text { color: #666; font-size: 14px; }
    .upload-text span { color: #6366f1; }
    .file-name { margin-top: 10px; font-size: 13px; color: #6366f1; }

    /* Inputs */
    input[type="text"], input[type="url"], textarea {
      width: 100%; padding: 13px 15px;
      background: #0a0a14; border: 1.5px solid #1e1e30;
      border-radius: 10px; color: #e2e2f0; font-size: 14px;
      outline: none; transition: border-color 0.18s; font-family: inherit;
    }
    input[type="text"]:focus, input[type="url"]:focus, textarea:focus { border-color: #6366f1; }
    input::placeholder, textarea::placeholder { color: #444; }
    textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

    .field-label { font-size: 12px; color: #666; margin-bottom: 6px; margin-top: 16px; letter-spacing: 0.3px; }

    /* Save path */
    .save-row { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
    .save-row input { flex: 1; }
    .save-hint { font-size: 11px; color: #444; margin-top: 5px; }

    /* Generate button */
    .gen-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.18s; margin-top: 20px; letter-spacing: 0.2px;
    }
    .gen-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .gen-btn:hover:not(:disabled) { opacity: 0.88; }

    /* Progress */
    .progress { display: none; margin-top: 22px; }
    .prog-steps { display: flex; flex-direction: column; gap: 10px; }
    .step {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      background: #0f0f1e; border: 1px solid #1e1e30;
      font-size: 13px; color: #666; transition: all 0.3s;
    }
    .step.active { border-color: #6366f1; color: #e2e2f0; background: #15153a; }
    .step.done { border-color: #22c55e44; color: #22c55e; background: #0f1e14; }
    .step-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #2a2a45; border-top-color: #6366f1;
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result { display: none; margin-top: 24px; }
    .section-title { font-size: 11px; color: #666; letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
    .info-box {
      background: #0f0f1e; border: 1px solid #1e1e30;
      border-radius: 10px; padding: 14px 16px;
      margin-bottom: 12px; font-size: 13px; line-height: 1.7; color: #ccc;
    }
    .info-box h4 { color: #fff; font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .point { padding: 3px 0; color: #bbb; }
    .point::before { content: "▸ "; color: #6366f1; }

    video { width: 100%; border-radius: 12px; margin-top: 12px; background: #000; max-height: 420px; }

    .action-row { display: flex; gap: 10px; margin-top: 12px; }
    .dl-btn {
      flex: 1; padding: 11px; background: #22c55e;
      color: #fff; border: none; border-radius: 9px;
      font-size: 14px; font-weight: 600; cursor: pointer; text-align: center;
      text-decoration: none; display: block;
    }
    .dl-btn:hover { opacity: 0.88; }

    .saved-path {
      margin-top: 10px; padding: 10px 14px;
      background: #0d1a10; border: 1px solid #22c55e44;
      border-radius: 8px; font-size: 12px; color: #22c55e;
      word-break: break-all;
    }

    /* Image preview grid */
    .img-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .img-thumb {
      width: 72px; height: 72px; object-fit: cover;
      border-radius: 8px; border: 1.5px solid #2a2a45;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Paper to <span>Shorts</span></h1>
  <p>논문·뉴스·이미지 → AI 스크립트 → TTS → 유튜브 숏츠 자동 생성</p>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" data-tab="pdf">📄 PDF</button>
    <button class="tab" data-tab="url">🔗 URL</button>
    <button class="tab" data-tab="images">🖼️ 이미지</button>
  </div>

  <!-- PDF Tab -->
  <div id="tab-pdf">
    <div class="upload-area" id="drop-zone-pdf">
      <div class="upload-icon">📄</div>
      <div class="upload-text"><span>PDF 파일 선택</span> 또는 드래그&드롭</div>
      <div class="file-name" id="pdf-name"></div>
    </div>
    <input type="file" id="file-input" accept=".pdf" style="display:none" />
  </div>

  <!-- URL Tab -->
  <div id="tab-url" style="display:none">
    <div class="field-label">기사 / 블로그 URL</div>
    <input id="url-input" type="url" placeholder="https://news.naver.com/..." />
  </div>

  <!-- Images Tab -->
  <div id="tab-images" style="display:none">
    <div class="upload-area" id="drop-zone-img">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text"><span>이미지 선택</span> (최대 5장, JPG·PNG·WebP)</div>
      <div class="file-name" id="img-count"></div>
    </div>
    <input type="file" id="img-input" accept=".jpg,.jpeg,.png,.webp" multiple style="display:none" />
    <div class="img-preview" id="img-preview"></div>
    <div class="field-label">주제 / 설명 (선택)</div>
    <textarea id="caption-input" placeholder="이미지와 관련된 설명이나 만들고 싶은 영상 주제를 입력하세요..."></textarea>
  </div>

  <!-- Save path -->
  <div class="field-label">저장 경로 (선택)</div>
  <input id="save-dir" type="text" placeholder="예: ~/Desktop 또는 /Users/jhlee/Downloads" />
  <div class="save-hint">비워두면 서버 output/ 폴더에만 저장됩니다</div>

  <button class="gen-btn" id="generate-btn" disabled>숏츠 생성하기</button>

  <!-- Progress -->
  <div class="progress" id="progress">
    <div class="prog-steps">
      <div class="step" id="step-script">
        <span class="step-icon">✍️</span>
        <span>AI 스크립트 생성 중...</span>
      </div>
      <div class="step" id="step-tts">
        <span class="step-icon">🎙️</span>
        <span>음성 합성 중...</span>
      </div>
      <div class="step" id="step-img">
        <span class="step-icon">🎨</span>
        <span id="step-img-text">AI 배경 이미지 생성 중... (장면별 약 10초)</span>
      </div>
      <div class="step" id="step-video">
        <span class="step-icon">🎬</span>
        <span>영상 렌더링 중...</span>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="section-title">생성 결과</div>
    <div class="info-box">
      <h4 id="res-title"></h4>
      <div id="res-points"></div>
    </div>
    <div class="info-box">
      <div style="font-size:11px;color:#666;margin-bottom:6px;">나레이션</div>
      <div id="res-narration"></div>
    </div>
    <video id="res-video" controls playsinline></video>
    <div class="action-row">
      <a id="download-link" class="dl-btn" download>⬇ 다운로드</a>
    </div>
    <div class="saved-path" id="saved-path" style="display:none"></div>
  </div>
</div>

<script>
  const genBtn = document.getElementById("generate-btn");
  const progress = document.getElementById("progress");
  const result = document.getElementById("result");
  let activeTab = "pdf";
  let selectedFile = null;
  let selectedImages = [];

  // Tab switching
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      activeTab = tab.dataset.tab;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      ["pdf", "url", "images"].forEach(t =>
        document.getElementById(`tab-${t}`).style.display = t === activeTab ? "block" : "none"
      );
      updateBtnState();
    });
  });

  function updateBtnState() {
    if (activeTab === "pdf") genBtn.disabled = !selectedFile;
    else if (activeTab === "url") genBtn.disabled = !document.getElementById("url-input").value.trim();
    else genBtn.disabled = selectedImages.length === 0;
  }

  document.getElementById("url-input").addEventListener("input", updateBtnState);

  // PDF drag & drop
  const pdfZone = document.getElementById("drop-zone-pdf");
  const fileInput = document.getElementById("file-input");
  pdfZone.addEventListener("click", () => fileInput.click());
  pdfZone.addEventListener("dragover", e => { e.preventDefault(); pdfZone.classList.add("dragover"); });
  pdfZone.addEventListener("dragleave", () => pdfZone.classList.remove("dragover"));
  pdfZone.addEventListener("drop", e => {
    e.preventDefault(); pdfZone.classList.remove("dragover");
    const f = e.dataTransfer.files[0];
    if (f?.name.toLowerCase().endsWith(".pdf")) setFile(f);
  });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  function setFile(f) {
    selectedFile = f;
    document.getElementById("pdf-name").textContent = f.name;
    updateBtnState();
  }

  // Image drag & drop
  const imgZone = document.getElementById("drop-zone-img");
  const imgInput = document.getElementById("img-input");
  imgZone.addEventListener("click", () => imgInput.click());
  imgZone.addEventListener("dragover", e => { e.preventDefault(); imgZone.classList.add("dragover"); });
  imgZone.addEventListener("dragleave", () => imgZone.classList.remove("dragover"));
  imgZone.addEventListener("drop", e => {
    e.preventDefault(); imgZone.classList.remove("dragover");
    setImages(Array.from(e.dataTransfer.files));
  });
  imgInput.addEventListener("change", () => setImages(Array.from(imgInput.files)));

  function setImages(files) {
    const allowed = ["image/jpeg", "image/png", "image/webp"];
    selectedImages = files.filter(f => allowed.includes(f.type)).slice(0, 5);
    document.getElementById("img-count").textContent =
      selectedImages.length ? `${selectedImages.length}장 선택됨` : "";

    const preview = document.getElementById("img-preview");
    preview.innerHTML = "";
    selectedImages.forEach(f => {
      const img = document.createElement("img");
      img.className = "img-thumb";
      img.src = URL.createObjectURL(f);
      preview.appendChild(img);
    });
    updateBtnState();
  }

  // Progress steps manager
  const steps = ["step-script", "step-tts", "step-img", "step-video"];
  let currentStep = 0;
  let stepTimer;

  function resetSteps() {
    steps.forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove("active", "done");
      const icon = el.querySelector(".step-icon");
      const spin = el.querySelector(".spinner");
      if (spin) { spin.remove(); }
      icon.style.display = "";
    });
    currentStep = 0;
  }

  function activateStep(idx) {
    if (idx > 0) {
      const prev = document.getElementById(steps[idx - 1]);
      prev.classList.remove("active");
      prev.classList.add("done");
      const spin = prev.querySelector(".spinner");
      if (spin) spin.remove();
      prev.querySelector(".step-icon").textContent = "✅";
      prev.querySelector(".step-icon").style.display = "";
    }
    if (idx >= steps.length) return;
    const el = document.getElementById(steps[idx]);
    el.classList.add("active");
    const icon = el.querySelector(".step-icon");
    icon.style.display = "none";
    const spinner = document.createElement("span");
    spinner.className = "spinner";
    el.insertBefore(spinner, el.firstChild);
  }

  // Update image step text based on tab
  function updateImgStepText() {
    document.getElementById("step-img-text").textContent =
      activeTab === "images"
        ? "이미지 분석 완료 (업로드 이미지 사용)"
        : "AI 배경 이미지 생성 중... (장면별 약 10초)";
  }

  // Auto-advance steps while waiting
  function startStepTimer() {
    activateStep(0);
    const delays = [7000, 8000, activeTab === "images" ? 3000 : 70000, 15000];
    let idx = 0;

    function next() {
      idx++;
      if (idx < steps.length) {
        activateStep(idx);
        stepTimer = setTimeout(next, delays[idx]);
      }
    }
    stepTimer = setTimeout(next, delays[0]);
  }

  function finishSteps() {
    clearTimeout(stepTimer);
    for (let i = currentStep; i <= steps.length; i++) activateStep(steps.length);
    steps.forEach(id => {
      const el = document.getElementById(id);
      const spin = el.querySelector(".spinner");
      if (spin) spin.remove();
      const icon = el.querySelector(".step-icon");
      icon.style.display = "";
      if (!el.classList.contains("done")) {
        el.classList.add("done");
        icon.textContent = "✅";
      }
    });
  }

  // Generate
  genBtn.addEventListener("click", async () => {
    genBtn.disabled = true;
    result.style.display = "none";
    progress.style.display = "block";
    updateImgStepText();
    resetSteps();
    startStepTimer();

    const saveDir = document.getElementById("save-dir").value.trim();
    let res;

    try {
      if (activeTab === "pdf") {
        if (!selectedFile) return;
        const fd = new FormData();
        fd.append("file", selectedFile);
        fd.append("save_dir", saveDir);
        res = await fetch("/generate/pdf", { method: "POST", body: fd });

      } else if (activeTab === "url") {
        const url = document.getElementById("url-input").value.trim();
        const fd = new FormData();
        fd.append("url", url);
        fd.append("save_dir", saveDir);
        res = await fetch("/generate/url", { method: "POST", body: fd });

      } else {
        const fd = new FormData();
        selectedImages.forEach(f => fd.append("files", f));
        fd.append("caption", document.getElementById("caption-input").value);
        fd.append("save_dir", saveDir);
        res = await fetch("/generate/images", { method: "POST", body: fd });
      }

      const data = await res.json();
      finishSteps();
      progress.style.display = "none";

      if (!res.ok) {
        alert(`오류: ${data.detail}`);
        return;
      }

      document.getElementById("res-title").textContent = data.script.title;
      document.getElementById("res-points").innerHTML =
        data.script.points.map(p => `<div class="point">${p}</div>`).join("");
      document.getElementById("res-narration").textContent = data.script.narration;

      const video = document.getElementById("res-video");
      video.src = data.video_url;

      const dl = document.getElementById("download-link");
      dl.href = data.video_url;
      dl.download = `${data.script.title}.mp4`;

      const sp = document.getElementById("saved-path");
      if (data.saved_path) {
        sp.textContent = `💾 저장됨: ${data.saved_path}`;
        sp.style.display = "block";
      } else {
        sp.style.display = "none";
      }

      result.style.display = "block";
    } catch (err) {
      finishSteps();
      progress.style.display = "none";
      alert("서버 오류가 발생했습니다.");
    } finally {
      updateBtnState();
    }
  });
</script>
</body>
</html>
